# Netlify — Frontend (Vite + React)
# Site settings: Base directory = Frontend (if connected at repo root)

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# version.json must stay fresh so the APK/browser can detect updates
[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Prefer real static files (version.json) over SPA fallback
[[redirects]]
  from = "/version.json"
  to = "/version.json"
  status = 200
  force = false

# SPA fallback (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: set in Netlify UI → Environment variables (required for API):
#   VITE_API_URL = https://YOUR-RENDER-SERVICE.onrender.com/api
